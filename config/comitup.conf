# Install at /etc/comitup.conf. Comitup manages WiFi on the Pi:
#   - On boot it tries known WiFi networks.
#   - If none connect within ~60s, it brings up its own AP so you can join
#     with your phone and enter WiFi credentials via a captive portal.
#   - After you submit, it switches back to client mode.

# SSID of the fallback AP. "<n>" is replaced with a digit if multiple Pis
# with the same name are nearby. Connect your phone to this SSID.
ap_name: audiorec-<nnn>

# Leave empty for an open AP (simpler on first boot). Set to a password
# if you want to require one for the setup network.
ap_password:

# Channel the AP runs on.
ap_channel: 1

# Comitup re-checks for known WiFi periodically even while in AP mode.
# Default (600s) is fine.
# web_service: comitup-web
enable_appliance_mode: False

# Show the Pi's mDNS name on the captive portal page.
primary_wifi_device: wlan0
